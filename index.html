<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div class="container mt-3">
        <div class="row mb-3">
            <div class="col-md-12 col-sm-12 mb-2">

                <div class="form-group">
                    <label for="txtX">Número X</label>
                    <input type="number" step="0.5" class="form-control" id="txtX" name="txtX" value>
                </div>
                <br>
                <div class="form-group">
                    <label for="txtY">Número Y</label>
                    <input type="number" step="0.5" class="form-control" id="txtY" name="txtY" value>
                </div>
                <br>
                <div class="form-group">
                    <label for="txtZ">Número Z</label>
                    <input type="number" step="0.5" class="form-control" id="txtZ" name="txtZ" value>
                </div>
                <br>
                <button id="btn_ordenar" class="btn btn-danger">Ordenar</button>

            </div>
            <div class="col-md-12 col-sm-12 mb-2">
                <div class="alert alert-primary" role="alert">
                    <p id="txtresultado">Resultado: </p>
                </div>
            </div>
            <br>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>

    <script src="JS/javaindex.js"></script>
</body>
</html>
